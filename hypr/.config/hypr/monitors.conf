########################################
# MONITOR LAYOUT (Stable Geometry)
########################################

# --------------------------------------
# DVI-I-1
# ViewSonic VA2432-FHD
# Native: 1920x1080@60
# Rotated 90° clockwise (transform,1)
#
# Effective resolution after rotation:
# 1080x1920
#
# Positioned at:
# X = 0
# Y = 0
#
# Occupies:
# X: 0 → 1080
# Y: 0 → 1920
# --------------------------------------
monitor=DVI-I-1,1920x1080@60,0x0,1,transform,1


# --------------------------------------
# HDMI-A-1 (MAIN MONITOR)
# ViewSonic VX2480-2K
# Native: 2560x1440@74.93Hz
#
# Positioned immediately to the right of rotated DVI
# Rotated DVI width = 1080
#
# X = 1080
# Y = 0  (Top aligned for clean geometry)
#
# Occupies:
# X: 1080 → 3640
# Y: 0 → 1440
# --------------------------------------
monitor=HDMI-A-1,2560x1440@74.93,1080x0,1


# --------------------------------------
# eDP-1 (Laptop Display)
# Native: 1920x1080@60
#
# We center it vertically relative to HDMI (1440 height)
#
# Center calculation:
# (1440 - 1080) / 2 = 180
#
# HDMI right edge = 1080 + 2560 = 3640
#
# X = 3640
# Y = 180
#
# Occupies:
# X: 3640 → 5560
# Y: 180 → 1260
#
# This creates:
# - No overlap
# - Clean rectangular regions
# - No negative reserved areas
# --------------------------------------
monitor=eDP-1,1920x1080@60,3640x180,1

