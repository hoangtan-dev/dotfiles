# Workspace Configuration
# Assign workspaces to specific monitors for better organization

# HDMI-A-1 (Main monitor - 2560x1440): Workspaces 1, 2, 4, 6, 8, 10
workspace=1,monitor:HDMI-A-1,default:true
workspace=2,monitor:HDMI-A-1
workspace=4,monitor:HDMI-A-1
workspace=6,monitor:HDMI-A-1
workspace=8,monitor:HDMI-A-1
workspace=10,monitor:HDMI-A-1

# DVI-I-2 (Secondary monitor - 1920x1080): Workspaces 3, 5, 7, 9
workspace=3,monitor:DVI-I-2,default:true
workspace=5,monitor:DVI-I-2
workspace=7,monitor:DVI-I-2
workspace=9,monitor:DVI-I-2
