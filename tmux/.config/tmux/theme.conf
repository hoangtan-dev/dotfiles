# ---------------------------------------------------------
# Catppuccin
# ---------------------------------------------------------

set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# ---------------------------------------------------------
# Terminal / RGB / Undercurl
# ---------------------------------------------------------

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ---------------------------------------------------------
# General
# ---------------------------------------------------------

set -g status-position bottom
set -g status-justify absolute-centre

set -g status-left-length 100
set -g status-right-length 100

set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

# ---------------------------------------------------------
# Left Status
# ---------------------------------------------------------

set -g status-left ""

# Session
set -ga status-left "#{?client_prefix,#[bg=#{@thm_red},fg=#{@thm_bg}]#[bold] 󰠠 #S ,#[fg=#{@thm_green}] 󰠠 #S }"

# Separator
set -ga status-left "#[fg=#{@thm_overlay_0}]│"

# Current command icon
set -ga status-left '#{?#{==:#{pane_current_command},nvim},#[fg=#{@thm_green}]  ,}'
set -ga status-left '#{?#{==:#{pane_current_command},python3},#[fg=#{@thm_yellow}]  ,}'
set -ga status-left '#{?#{==:#{pane_current_command},reddittui},#[fg=#{@thm_red}]  ,}'
set -ga status-left '#{?#{==:#{pane_current_command},opencode},#[fg=#{@thm_blue}] 󰘦 ,}'
set -ga status-left '#{?#{==:#{pane_current_command},bash},#[fg=#{@thm_peach}]  ,}'
set -ga status-left '#{?#{==:#{pane_current_command},zsh},#[fg=#{@thm_peach}]  ,}'

# Current command text
set -ga status-left "#[fg=#{@thm_maroon}] #{pane_current_command} "

# Separator
set -ga status-left "#[fg=#{@thm_overlay_0}]│"

# Path
set -ga status-left "#[fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "

# Zoom indicator
set -ga status-left "#[fg=#{@thm_overlay_0}]#{?window_zoomed_flag,│,}"
set -ga status-left "#[fg=#{@thm_yellow}]#{?window_zoomed_flag, 󰁌 zoom ,}"

# ---------------------------------------------------------
# Center Windows
# ---------------------------------------------------------

set -g window-status-separator "#[fg=#{@thm_overlay_0}]│"

# Inactive windows
set -g window-status-format '#{?#{||:#{==:#{window_name},nvim},#{==:#{window_name},python3},#{==:#{window_name},reddittui},#{==:#{window_name},opencode},#{==:#{window_name},bash},#{==:#{window_name},zsh}},#[fg=#{@thm_rosewater}]#I#{?#{==:#{window_name},nvim},#[fg=#{@thm_green}]  ,}#{?#{==:#{window_name},python3},#[fg=#{@thm_yellow}]  ,}#{?#{==:#{window_name},reddittui},#[fg=#{@thm_red}]  ,}#{?#{==:#{window_name},opencode},#[fg=#{@thm_blue}]  ,}#{?#{||:#{==:#{window_name},bash},#{==:#{window_name},zsh}},#[fg=#{@thm_peach}]  ,} ,#[fg=#{@thm_rosewater}]#I #[norange,nounderscore]#{window_name} }'

# Active window
set -g window-status-current-format '#[bg=#{@thm_peach},bold] #{?#{||:#{==:#{window_name},nvim},#{==:#{window_name},python3},#{==:#{window_name},reddittui},#{==:#{window_name},opencode},#{==:#{window_name},bash},#{==:#{window_name},zsh}},#I#{?#{==:#{window_name},nvim},#[fg=#{@thm_green}]  ,}#{?#{==:#{window_name},python3},#[fg=#{@thm_yellow}]  ,}#{?#{==:#{window_name},reddittui},#[fg=#{@thm_red}]  ,}#{?#{==:#{window_name},opencode},#[fg=#{@thm_blue}]  ,}#{?#{||:#{==:#{window_name},bash},#{==:#{window_name},zsh}},#[fg=#{@thm_bg}]  ,} ,#I #[fg=#{@thm_bg}]#{window_name} }'

set -g window-status-style "fg=#{@thm_rosewater}"
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"
set -g window-status-last-style "fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"

# ---------------------------------------------------------
# Right Status
# ---------------------------------------------------------

set -g status-right ""

# Time
set -ga status-right "#[fg=#{@thm_overlay_0}]│"
set -ga status-right "#[fg=#{@thm_sapphire}] 󰥔 %H:%M "

# Date
set -ga status-right "#[fg=#{@thm_overlay_0}]│"
set -ga status-right "#[fg=#{@thm_lavender}] 󰃭 %d %b "

# ---------------------------------------------------------
# Message / Popup styles
# ---------------------------------------------------------

set -g message-style "bg=default,fg=#{@thm_text}"
set -g message-command-style "bg=default,fg=#{@thm_mauve}"

set -g popup-style "bg=default,fg=#{@thm_text}"
set -g popup-border-style "fg=#{@thm_blue}"

set -g menu-style "bg=default,fg=#{@thm_text}"
set -g menu-selected-style "bg=#{@thm_blue},fg=#{@thm_bg}"
